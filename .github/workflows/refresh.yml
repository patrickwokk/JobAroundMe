name: Refresh listings

on:
  schedule:
    # Daily at ~6am Central. The sweep flags postings unseen for 4+ days
    # and expires them after 14 — so a daily run keeps the board honest.
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Scrape sources and sweep lifecycle
        run: bun run refresh

      - name: Commit updated data
        run: |
          git config user.name "jobaroundme-refresh"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No listing changes today."
          else
            git commit -m "data: refresh listings ($(date -u +%Y-%m-%d))"
            git push
          fi
