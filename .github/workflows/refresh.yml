name: Refresh listings

on:
  schedule:
    # Daily at ~6am Central. The sweep flags postings unseen for 4+ days
    # and expires them after 14 — so a daily run keeps the board honest.
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Scrape sources and sweep lifecycle
        run: bun run refresh

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "jobaroundme-refresh"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No listing changes today."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: refresh listings ($(date -u +%Y-%m-%d))"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # GITHUB_TOKEN pushes don't trigger push-workflows, so kick the deploy explicitly.
      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref main --repo "$GITHUB_REPOSITORY"
